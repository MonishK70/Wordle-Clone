<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Wordle</title>
</head>
<body>
    
    <h1>Wordle</h1>

    <div id="guesses"></div>
    <input id="wordInput" type="text" maxlength="5" placeholder="Enter Word">
    <div class="button-row">
        <button id="submitBtn">Submit</button>
        <button id="resetBtn">Reset</button>
    </div>

    <p id="error"></p>
    <p id="answer"></p>


    <script src="Wordle_HTML.js"></script>
</body>
</html>
